title: SkyWeather Forecast - Overlay Credential Capture
id: d7a1f3e0-1004-4a5b-9e2c-skyweather-overlay
status: experimental
description: |
  Detects overlay credential capture via TYPE_ACCESSIBILITY_OVERLAY (2032).
  Pattern: AccessibilityService observes target foreground transition →
  renders fake login overlay using WindowManager.addView with overlay type →
  captures typed credentials → exfils to C2.

  Critical: TYPE_ACCESSIBILITY_OVERLAY bypasses SYSTEM_ALERT_WINDOW permission.
  Accessibility grant IS the overlay permission on Android 13+.
references:
  - https://github.com/F2u0a0d3/takopii
  - MITRE ATT&CK Mobile T1411
author: Takopii Detection Corpus
date: 2026/05/11
tags:
  - attack.credential_access
  - attack.t1411
logsource:
  category: accessibility_event
  product: android
detection:
  overlay_window_add:
    # WindowManager.addView with TYPE_ACCESSIBILITY_OVERLAY
    logcat_tag|contains:
      - 'WindowManager'
      - 'ViewRootImpl'
    message|contains:
      - 'type=2032'
      - 'TYPE_ACCESSIBILITY_OVERLAY'
      - 'addView'
  target_foreground:
    # AccessibilityService detects target app foregrounded
    event_type: 'TYPE_WINDOW_STATE_CHANGED'
    source_package: 'com.skyweather.forecast'
  credential_capture:
    # Overlay credential event in telemetry
    message|contains:
      - 'overlay_pwd'
      - 'overlay_usr'
      - 'overlay_credential'
  frida_detection:
    # Frida monitor overlay-watch alert
    message|contains:
      - '[CRITICAL] OVERLAY:'
      - 'TYPE_ACCESSIBILITY_OVERLAY'
  condition: overlay_window_add or credential_capture or (target_foreground and frida_detection)
falsepositives:
  - Accessibility apps using TYPE_ACCESSIBILITY_OVERLAY for legitimate purposes
    (e.g., screen readers with custom overlay hints). Mitigated by credential
    event co-occurrence.
level: critical
